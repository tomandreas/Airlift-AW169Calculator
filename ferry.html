<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AW169 — Ferry Planning</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e14; --surface: #13171f; --surface2: #1a1f2b; --border: #252c3b;
    --accent: #e8a020; --accent2: #4ea8de; --danger: #e05252; --ok: #52c07a;
    --text: #d4dbe8; --muted: #6b7a94; --white: #f0f4fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px; opacity: 0.25; pointer-events: none; z-index: 0;
  }
  .page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

  /* Header */
  header { display: flex; align-items: flex-end; gap: 20px; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 18px; }
  .logo-block h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 3px; color: var(--white); line-height: 1; }
  .logo-block h1 span { color: var(--accent); }
  .logo-block p { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
  .header-right { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .header-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; border-radius: 2px; letter-spacing: 1px; }
  .back-link { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); text-decoration: none; letter-spacing: 1px; transition: color 0.15s; }
  .back-link:hover { color: var(--accent); }

  /* Layout */
  .planner-layout { display: grid; grid-template-columns: 1fr 420px; gap: 20px; align-items: start; }

  /* Panel */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px; margin-bottom: 16px; }
  .panel-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

  /* Form elements */
  label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  input[type="text"], input[type="number"], input[type="time"] {
    background: var(--surface2); border: 1px solid var(--border); color: var(--white);
    font-family: 'IBM Plex Mono', monospace; font-size: 14px; padding: 9px 12px;
    border-radius: 3px; outline: none; transition: border-color 0.15s; -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input:focus { border-color: var(--accent); }

  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-group input { width: 100%; }

  /* Slider */
  .slider-group { display: flex; flex-direction: column; gap: 6px; }
  .slider-label-row { display: flex; justify-content: space-between; align-items: center; }
  .slider-val { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: var(--accent); }
  input[type="range"] { width: 100%; height: 4px; -webkit-appearance: none; background: var(--border); border-radius: 2px; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 2px solid var(--bg); }
  .range-hints { display: flex; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); }

  /* Waypoint cards */
  .wp-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    padding: 14px 16px; margin-bottom: 0;
    transition: border-color 0.15s;
  }
  .wp-card.valid { border-color: rgba(78,168,222,0.3); }
  .wp-card.invalid { border-color: rgba(224,82,82,0.4); }
  .wp-header { display: flex; align-items: center; gap: 10px; }
  .wp-badge {
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px;
    color: var(--accent); min-width: 28px; line-height: 1;
  }
  .icao-input { width: 82px !important; text-transform: uppercase; letter-spacing: 2px; font-size: 15px !important; font-weight: 600; }
  .ap-name { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); flex: 1; }
  .ap-name.found { color: var(--accent2); }
  .wp-remove {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; width: 24px; height: 24px;
    border-radius: 2px; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .wp-remove:hover { border-color: var(--danger); color: var(--danger); }

  /* Leg connector */
  .leg-connector { display: flex; gap: 12px; margin: 0; padding: 8px 0; align-items: stretch; }
  .leg-line-col { display: flex; flex-direction: column; align-items: center; width: 28px; flex-shrink: 0; }
  .leg-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .leg-vert { flex: 1; width: 1px; background: var(--border); min-height: 20px; }
  .leg-inputs-col { flex: 1; }
  .leg-inputs { background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 10px 12px; }
  .leg-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .leg-dist { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); flex: 1; }
  .leg-dist.computed { color: var(--accent2); }

  /* Wind toggle */
  .wind-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
  .wt-btn { background: var(--surface); border: none; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 5px 10px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
  .wt-btn.active { background: var(--accent); color: #000; font-weight: 600; }

  .wind-fields { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .wind-fields input { width: 70px; padding: 6px 8px; font-size: 13px; }
  .wind-fields .unit { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); }
  .wind-fields label { font-size: 10px; }
  .gs-result { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ok); margin-left: 4px; }

  /* Add WP button */
  .add-wp-btn {
    width: 100%; padding: 11px; margin-top: 8px;
    background: none; border: 1px dashed var(--border); color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; border-radius: 3px; cursor: pointer; transition: all 0.15s;
  }
  .add-wp-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Calculate button */
  .calc-btn {
    width: 100%; padding: 14px; margin-top: 16px;
    background: var(--accent); border: none; border-radius: 3px; color: #000;
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  }
  .calc-btn:hover { background: #f0b030; transform: translateY(-1px); }

  /* Timeline results */
  .timeline { margin-top: 0; }
  .tl-entry { display: flex; gap: 0; }
  .tl-left { width: 52px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
  .tl-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 4px; }
  .tl-dot.dest { background: var(--ok); }
  .tl-line { flex: 1; width: 1px; background: var(--border); min-height: 8px; }
  .tl-right { flex: 1; padding: 0 0 16px 10px; }
  .tl-wp { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 10px 14px; margin-bottom: 4px; }
  .tl-wp.warn { border-color: var(--danger); }
  .tl-icao { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--white); line-height: 1; }
  .tl-apname { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .tl-times { display: flex; gap: 16px; flex-wrap: wrap; }
  .tl-time-item { display: flex; flex-direction: column; gap: 2px; }
  .tl-time-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .tl-time-val { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; color: var(--white); }
  .tl-time-val.fuel-ok { color: var(--ok); }
  .tl-time-val.fuel-warn-low { color: var(--accent); }
  .tl-time-val.fuel-warn { color: var(--danger); }

  .tl-leg { padding: 6px 10px; margin-bottom: 4px; }
  .tl-leg-info { display: flex; gap: 12px; flex-wrap: wrap; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
  .tl-leg-info span { color: var(--accent2); }
  .tl-leg-warn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--danger); margin-top: 4px; padding: 4px 8px; background: rgba(224,82,82,0.08); border-radius: 2px; border-left: 2px solid var(--danger); }

  /* Map */
  .map-panel { position: sticky; top: 20px; }
  .map-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  #map-canvas { display: block; border-radius: 3px; width: 100%; }

  /* Map legend */
  .map-legend { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Buttons */
  .calc-btn { width: 100%; padding: 14px; margin-top: 8px; background: var(--accent); border: none; border-radius: 3px; color: #000; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .calc-btn:hover { background: #f0b030; transform: translateY(-1px); }
  .opt-btn { width: 100%; padding: 12px; margin-top: 8px; background: none; border: 1px solid var(--accent2); border-radius: 3px; color: var(--accent2); font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .opt-btn:hover { background: rgba(78,168,222,0.1); transform: translateY(-1px); }

  @media (max-width: 780px) {
    .planner-layout { grid-template-columns: 1fr; }
    .map-panel { position: static; }
    .settings-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="logo-block">
      <h1>AW<span>169</span></h1>
      <p>Ferry Planning</p>
    </div>
    <div class="header-right">
      <div class="header-badge">FERRY</div>
      <a href="index.html" class="back-link">← Back</a>
    </div>
  </header>

  <div class="planner-layout">
    <!-- LEFT: Controls -->
    <div class="left-col">

      <!-- Settings -->
      <div class="panel">
        <div class="panel-title">Flight Settings</div>
        <div class="settings-grid">
          <div class="field-group">
            <label>Departure Time (first leg)</label>
            <input type="time" id="dep-time" value="08:00">
          </div>
          <div class="field-group">
            <label>TAS</label>
            <input type="number" id="tas" value="125" min="50" max="200" style="width:100%">
            <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;">knots (fixed)</div>
          </div>
        </div>
        <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Route Wind (optional — populates all legs)</div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <label>From</label>
            <input type="number" id="route-wind-dir" placeholder="270" min="0" max="359" style="width:72px" oninput="applyRouteWind()">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)">°</span>
            <input type="number" id="route-wind-spd" placeholder="0" min="0" max="150" style="width:60px" oninput="applyRouteWind()">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)">kt</span>
            <button onclick="clearRouteWind()" style="background:none;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 8px;border-radius:2px;cursor:pointer;">Clear</button>
          </div>
        </div>

      <!-- Route builder -->
      <div class="panel">
        <div class="panel-title">Route</div>
        <div id="route-builder"></div>
        <button class="add-wp-btn" onclick="addWaypoint()">+ Add Waypoint</button>
        <button class="opt-btn" onclick="optimizeRoute()">⟳ Optimaliser rute</button>
        <button class="calc-btn" onclick="calculate()">Calculate Route</button>
        <div id="excluded-tags-wrap" style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:none;">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Ekskluderte flyplasser (stengt / ingen fuel)</div>
          <div id="excluded-tags" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;"></div>
        </div>
      </div>

      <!-- Optimize feedback -->
      <div id="opt-msg" style="display:none;margin-bottom:16px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:10px 14px;border-radius:3px;border-left:3px solid var(--accent2);background:rgba(78,168,222,0.06);color:var(--accent2);"></div>

      <!-- Results -->
      <div id="results-panel" style="display:none">
        <div class="panel">
          <div class="panel-title">Route Summary</div>
          <div id="summary-bar" style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:12px;"></div>
          <div class="timeline" id="timeline"></div>
        </div>
      </div>

    </div>

    <!-- RIGHT: Map -->
    <div class="map-panel">
      <div class="panel" style="padding:16px;">
        <div class="map-title">Norway — Route Map</div>
        <canvas id="map-canvas" width="400" height="500"></canvas>
        <div class="map-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#4ea8de"></div>Airport</div>
          <div class="legend-item"><div class="legend-dot" style="background:#e8a020"></div>Route WP</div>
          <div class="legend-item"><div class="legend-dot" style="background:#e05252"></div>Warning</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const FUEL_FLOW    = 300;   // kg/h
const FINAL_RESERVE = 130;  // kg
const CONT_PCT     = 0.10;  // 10% contingency
const MAX_FUEL     = 888;   // kg max ramp fuel

// ═══════════════════════════════════════════════════════════
// MATH UTILS
// ═══════════════════════════════════════════════════════════
function haversine(lat1,lon1,lat2,lon2) {
  const R=3440.065, r=Math.PI/180;
  const dLat=(lat2-lat1)*r, dLon=(lon2-lon1)*r;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearing(lat1,lon1,lat2,lon2) {
  const r=Math.PI/180;
  const dLon=(lon2-lon1)*r;
  const y=Math.sin(dLon)*Math.cos(lat2*r);
  const x=Math.cos(lat1*r)*Math.sin(lat2*r)-Math.sin(lat1*r)*Math.cos(lat2*r)*Math.cos(dLon);
  return ((Math.atan2(y,x)/r)+360)%360;
}
function headwindComponent(windDir,windSpd,track) {
  const diff=(windDir-track+360)%360;
  return Math.cos(diff*Math.PI/180)*windSpd;
}

// ═══════════════════════════════════════════════════════════
// TIME UTILS
// ═══════════════════════════════════════════════════════════
function parseTime(str) {
  const [h,m] = str.split(':').map(Number);
  return h*60+m;
}
function fmtTime(mins) {
  mins = Math.round(mins);
  const d = Math.floor(mins/(24*60));
  const t = ((mins%1440)+1440)%1440;
  const h = String(Math.floor(t/60)).padStart(2,'0');
  const m = String(t%60).padStart(2,'0');
  return (d>0?`+${d}d `:'')+`${h}:${m}`;
}
function fmtDuration(mins) {
  mins = Math.round(mins);
  const h=Math.floor(mins/60), m=mins%60;
  return `${h}h ${String(m).padStart(2,'0')}m`;
}

// ═══════════════════════════════════════════════════════════
// WAYPOINT STATE
// ═══════════════════════════════════════════════════════════
let waypoints = [
  { icao:'ENHF', mode:'gs', gs:125, windDir:270, windSpd:0, gstop:30 },
  { icao:'ENTC', mode:'gs', gs:125, windDir:270, windSpd:0, gstop:30 },
];

function addWaypoint() {
  waypoints.push({ icao:'', mode:'gs', gs:125, windDir:270, windSpd:0, gstop:30 });
  renderRoute();
}
function removeWaypoint(i) {
  if (waypoints.length<=2) return;
  waypoints.splice(i,1);
  renderRoute();
}

// ═══════════════════════════════════════════════════════════
// ROUTE RENDER
// ═══════════════════════════════════════════════════════════
function renderRoute() {
  const container = document.getElementById('route-builder');
  let html = '';
  waypoints.forEach((wp,i) => {
    const ap = AP[wp.icao.toUpperCase()];
    const isUnknown = !ap && wp.icao.length >= 4;
    const nameStr = ap ? ap.name : (isUnknown ? '<span style="color:var(--danger)">Unknown</span>' : '—');
    const cardClass = ap ? 'valid' : (isUnknown ? 'invalid' : '');
    const canRemove = waypoints.length > 2;

    html += `<div class="wp-card ${cardClass}" id="wpc-${i}">
      <div class="wp-header">
        <span class="wp-badge">${String(i+1).padStart(2,'0')}</span>
        <input class="icao-input" type="text" maxlength="6" placeholder="ICAO"
          value="${wp.icao}" onchange="updateICAO(${i},this.value)" oninput="updateICAO(${i},this.value)"
          style="text-transform:uppercase;width:90px !important;">
        <span class="ap-name ${ap?'found':''}" id="apname-${i}">${nameStr}</span>
        ${ap ? `<button onclick="excludeAirport('${wp.icao}')" style="background:none;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:9px;padding:3px 7px;border-radius:2px;cursor:pointer;flex-shrink:0;" onmouseover="this.style.borderColor='var(--danger)';this.style.color='var(--danger)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">✕ excl.</button>` : ''}
        ${canRemove ? `<button class="wp-remove" onclick="removeWaypoint(${i})">×</button>` : '<div style="width:24px"></div>'}
      </div>
      ${i > 0 && i < waypoints.length-1 ? `
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);">
        <div class="slider-group">
          <div class="slider-label-row">
            <label>Ground stop</label>
            <span class="slider-val" id="gstop-val-${i}">${wp.gstop} min</span>
          </div>
          <input type="range" min="10" max="120" step="10" value="${wp.gstop}"
            oninput="waypoints[${i}].gstop=parseInt(this.value);document.getElementById('gstop-val-${i}').textContent=this.value+' min'">
          <div class="range-hints"><span>10 min</span><span>2 hr</span></div>
        </div>
      </div>` : ''}
    </div>`;

    if (i < waypoints.length-1) {
      const nextAp = AP[(waypoints[i+1].icao||'').toUpperCase()];
      let distLabel = '— NM';
      if (ap && nextAp) {
        const d = haversine(ap.lat,ap.lon,nextAp.lat,nextAp.lon);
        distLabel = `${Math.round(d)} NM`;
      }
      const isWind = wp.mode === 'wind';
      const computedGS = getGS(i);
      html += `<div class="leg-connector">
        <div class="leg-line-col"><div class="leg-dot"></div><div class="leg-vert"></div></div>
        <div class="leg-inputs-col">
          <div class="leg-inputs">
            <div class="leg-top">
              <span class="leg-dist ${ap&&nextAp?'computed':''}" id="legdist-${i}">${distLabel}</span>
              <div class="wind-toggle">
                <button class="wt-btn ${!isWind?'active':''}" onclick="setLegMode(${i},'gs')">GS</button>
                <button class="wt-btn ${isWind?'active':''}" onclick="setLegMode(${i},'wind')">Wind</button>
              </div>
            </div>
            <div class="wind-fields" id="leg-fields-${i}">
              ${isWind ? `
                <label>From</label>
                <input type="number" value="${wp.windDir}" min="0" max="359" style="width:65px"
                  oninput="updateLeg(${i},'windDir',this.value)">
                <span class="unit">°</span>
                <input type="number" value="${wp.windSpd}" min="0" max="150" style="width:60px"
                  oninput="updateLeg(${i},'windSpd',this.value)">
                <span class="unit">kt</span>
                <span class="gs-result">→ GS: ${computedGS} kt</span>
              ` : `
                <label>Groundspeed</label>
                <input type="number" value="${wp.gs}" min="50" max="250" style="width:72px"
                  oninput="updateLeg(${i},'gs',this.value)">
                <span class="unit">kt</span>
              `}
            </div>
          </div>
        </div>
      </div>`;
    }
  });
  container.innerHTML = html;
}

function updateICAO(i, val) {
  waypoints[i].icao = val.toUpperCase();
  const ap = AP[val.toUpperCase()];
  const nameEl = document.getElementById(`apname-${i}`);
  const cardEl = document.getElementById(`wpc-${i}`);
  const isUnknown = !ap && val.length >= 4;
  if (nameEl) {
    nameEl.innerHTML = ap ? ap.name : (isUnknown ? '<span style="color:var(--danger)">Unknown</span>' : '—');
    nameEl.className = `ap-name ${ap?'found':''}`;
  }
  if (cardEl) cardEl.className = `wp-card ${ap?'valid':(isUnknown?'invalid':'')}`;
  renderLegDistances();
  drawMap();
}

function renderLegDistances() {
  waypoints.forEach((wp,i) => {
    if (i >= waypoints.length-1) return;
    const el = document.getElementById(`legdist-${i}`);
    if (!el) return;
    const a = AP[(wp.icao||'').toUpperCase()];
    const b = AP[(waypoints[i+1].icao||'').toUpperCase()];
    if (a && b) {
      el.textContent = `${Math.round(haversine(a.lat,a.lon,b.lat,b.lon))} NM`;
      el.className = 'leg-dist computed';
    } else {
      el.textContent = '— NM'; el.className = 'leg-dist';
    }
  });
}

function setLegMode(i, mode) { waypoints[i].mode = mode; renderRoute(); }

function updateLeg(i, field, val) {
  waypoints[i][field] = parseFloat(val)||0;
  if (waypoints[i].mode === 'wind') {
    const el = document.querySelector(`#leg-fields-${i} .gs-result`);
    if (el) el.textContent = `→ GS: ${getGS(i)} kt`;
  }
}

function getGS(i) {
  const wp = waypoints[i];
  if (wp.mode === 'gs') return wp.gs||125;
  const tas = parseFloat(document.getElementById('tas').value)||125;
  const a = AP[(wp.icao||'').toUpperCase()];
  const b = AP[(waypoints[i+1]?.icao||'').toUpperCase()];
  if (!a||!b) return tas;
  const track = bearing(a.lat,a.lon,b.lat,b.lon);
  const hw = headwindComponent(wp.windDir,wp.windSpd,track);
  return Math.round(tas-hw);
}

function applyRouteWind() {
  const dir = parseFloat(document.getElementById('route-wind-dir').value);
  const spd = parseFloat(document.getElementById('route-wind-spd').value);
  if (isNaN(dir)||isNaN(spd)) return;
  waypoints.forEach((wp,i) => {
    if (i < waypoints.length-1) { wp.windDir=dir; wp.windSpd=spd; wp.mode='wind'; }
  });
  renderRoute();
}

function clearRouteWind() {
  document.getElementById('route-wind-dir').value='';
  document.getElementById('route-wind-spd').value='';
  const tas = parseFloat(document.getElementById('tas').value)||125;
  waypoints.forEach((wp,i) => {
    if (i < waypoints.length-1) { wp.mode='gs'; wp.gs=tas; }
  });
  renderRoute();
}

// ═══════════════════════════════════════════════════════════
// CALCULATION
// ═══════════════════════════════════════════════════════════
function calculate() {
  const depMins = parseTime(document.getElementById('dep-time').value);
  const tas = parseFloat(document.getElementById('tas').value)||125;
  for (let i=0; i<waypoints.length; i++) {
    if (!AP[waypoints[i].icao]) {
      alert(`Waypoint ${i+1}: "${waypoints[i].icao}" not found in database.`);
      return;
    }
  }
  const legs = [];
  for (let i=0; i<waypoints.length-1; i++) {
    const a = AP[waypoints[i].icao], b = AP[waypoints[i+1].icao];
    const dist = haversine(a.lat,a.lon,b.lat,b.lon);
    const track = bearing(a.lat,a.lon,b.lat,b.lon);
    const gs = Math.max(30,getGS(i));
    const timeH = dist/gs;
    const tripFuel = timeH*FUEL_FLOW;
    const contFuel = tripFuel*CONT_PCT;
    const minFuelDep = tripFuel+contFuel+FINAL_RESERVE;
    const feasible = minFuelDep<=MAX_FUEL;
    legs.push({from:waypoints[i].icao,to:waypoints[i+1].icao,dist:Math.round(dist),
               track:Math.round(track),gs,timeH,timeMins:timeH*60,tripFuel,contFuel,minFuelDep,feasible});
  }
  const wps = [];
  let currentTime = depMins;
  for (let i=0; i<waypoints.length; i++) {
    const icao = waypoints[i].icao;
    const isFirst=i===0, isLast=i===waypoints.length-1;
    if (isFirst) {
      wps.push({icao,arrTime:null,arrFuel:null,depTime:currentTime,depFuel:MAX_FUEL,gstop:null});
    } else {
      const leg=legs[i-1];
      const arrFuel=MAX_FUEL-leg.tripFuel;
      const arrTime=currentTime+leg.timeMins;
      currentTime=arrTime;
      if (!isLast) {
        const gs=waypoints[i].gstop;
        currentTime+=gs;
        wps.push({icao,arrTime,arrFuel:Math.round(arrFuel),depTime:currentTime,depFuel:MAX_FUEL,gstop:gs});
      } else {
        wps.push({icao,arrTime,arrFuel:Math.round(arrFuel),depTime:null,depFuel:null,gstop:null});
      }
    }
  }
  renderResults(legs,wps);
  drawMap(legs,wps);
}

// ═══════════════════════════════════════════════════════════
// RESULTS RENDER
// ═══════════════════════════════════════════════════════════
function renderResults(legs,wps) {
  const panel=document.getElementById('results-panel');
  const tlEl=document.getElementById('timeline');
  const sumEl=document.getElementById('summary-bar');
  panel.style.display='block';
  const totalDist=legs.reduce((a,l)=>a+l.dist,0);
  const totalTime=legs.reduce((a,l)=>a+l.timeMins,0);
  const totalFuel=legs.reduce((a,l)=>a+l.tripFuel,0);
  const allFeasible=legs.every(l=>l.feasible);
  sumEl.innerHTML=`
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)">Total distance<br><span style="font-size:18px;color:var(--white)">${totalDist} NM</span></div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)">Block time<br><span style="font-size:18px;color:var(--white)">${fmtDuration(totalTime)}</span></div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)">Total fuel burned<br><span style="font-size:18px;color:var(--white)">${Math.round(totalFuel)} kg</span></div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)">Status<br><span style="font-size:14px;color:${allFeasible?'var(--ok)':'var(--danger)'};">${allFeasible?'✓ ALL LEGS OK':'⚠ RANGE EXCEEDED'}</span></div>
  `;
  let html='';
  for (let i=0; i<wps.length; i++) {
    const wp=wps[i], ap=AP[wp.icao], isLast=i===wps.length-1;
    const leg=i<legs.length?legs[i]:null, legWarn=leg&&!leg.feasible;
    html+=`<div class="tl-entry">
      <div class="tl-left">
        <div class="tl-dot ${isLast?'dest':''}"></div>
        ${i<wps.length-1?'<div class="tl-line"></div>':''}
      </div>
      <div class="tl-right">
        <div class="tl-wp ${legWarn?'warn':''}">
          <div class="tl-icao">${wp.icao}</div>
          <div class="tl-apname">${ap?.name||''}</div>
          <div class="tl-times">
            ${wp.arrTime!==null?`
              <div class="tl-time-item">
                <span class="tl-time-label">Arrival</span>
                <span class="tl-time-val">${fmtTime(wp.arrTime)}</span>
              </div>
              <div class="tl-time-item">
                <span class="tl-time-label">Fuel arr.</span>
                <span class="tl-time-val ${wp.arrFuel>=240?'fuel-ok':wp.arrFuel>=FINAL_RESERVE?'fuel-warn-low':'fuel-warn'}">${wp.arrFuel} kg</span>
              </div>
            `:''}
            ${wp.depTime!==null?`
              ${wp.arrTime!==null?`<div class="tl-time-item"><span class="tl-time-label">Gnd stop</span><span class="tl-time-val">${wp.gstop} min</span></div>`:''}
              <div class="tl-time-item">
                <span class="tl-time-label">Departure</span>
                <span class="tl-time-val">${fmtTime(wp.depTime)}</span>
              </div>
              <div class="tl-time-item">
                <span class="tl-time-label">Fuel dep.</span>
                <span class="tl-time-val">${wp.depFuel} kg</span>
              </div>
            `:''}
          </div>
        </div>
        ${leg?`<div class="tl-leg">
          <div class="tl-leg-info">
            <span>${leg.dist} NM</span>
            <span>Track ${leg.track}°</span>
            <span>GS ${leg.gs} kt</span>
            <span>${fmtDuration(leg.timeMins)}</span>
            <span>Burn ${Math.round(leg.tripFuel)} kg</span>
            <span>Min fuel ${Math.round(leg.minFuelDep)} kg</span>
          </div>
          ${!leg.feasible?`<div class="tl-leg-warn">⚠ Leg requires ${Math.round(leg.minFuelDep)} kg — exceeds max fuel (${MAX_FUEL} kg). Cannot complete this leg.</div>`:''}
        </div>`:''}
      </div>
    </div>`;
  }
  tlEl.innerHTML=html;
  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

const BBOX={x1:214,y1:76,w:1491,h:1768};
const CANVAS_SCALE=Math.min(MAP_W/BBOX.w,MAP_H/BBOX.h);
const OX=(MAP_W-BBOX.w*CANVAS_SCALE)/2;
const OY=(MAP_H-BBOX.h*CANVAS_SCALE)/2;

function proj(lat,lon){
  const gi=(lat-GRID.lat0)/(GRID.lat1-GRID.lat0)*(GRID.nlat-1);
  const gj=(lon-GRID.lon0)/(GRID.lon1-GRID.lon0)*(GRID.nlon-1);
  const i0=Math.max(0,Math.min(GRID.nlat-2,Math.floor(gi)));
  const j0=Math.max(0,Math.min(GRID.nlon-2,Math.floor(gj)));
  const i1=i0+1,j1=j0+1,fi=gi-i0,fj=gj-j0;
  function g(arr,i,j){return arr[i*GRID.nlon+j];}
  function bl(arr){return g(arr,i0,j0)*(1-fi)*(1-fj)+g(arr,i0,j1)*(1-fi)*fj+g(arr,i1,j0)*fi*(1-fj)+g(arr,i1,j1)*fi*fj;}
  const ipx=bl(GRID.px),ipy=bl(GRID.py);
  return[(ipx-BBOX.x1)*CANVAS_SCALE+OX,(ipy-BBOX.y1)*CANVAS_SCALE+OY];
}

const CALIBRATED=new Set(['ENBR','ENBO','ENTC','ENKR','ENZV','ENCN','ENRY','ENFL','ENAL','ENML','ENKB','ENOL','ENVA','FROSTA','ENRM','ENNM','ENBN','ENST','ENSH','ENEV','ENHF','ENLI','ENRO','ENGM','ENBL','ENSG','ENHD','ENFJ','ENRA','ENLK']);

function drawMap(legs,wps){
  const canvas=document.getElementById('map-canvas');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,MAP_W,MAP_H);
  ctx.fillStyle='#080b11';ctx.fillRect(0,0,MAP_W,MAP_H);
  ctx.strokeStyle='rgba(37,44,59,0.4)';ctx.lineWidth=0.5;
  for(let lat=58;lat<=72;lat+=2){const[,y]=proj(lat,15);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(MAP_W,y);ctx.stroke();}
  for(let lon=5;lon<=30;lon+=5){const[x]=proj(65,lon);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,MAP_H);ctx.stroke();}
  if(norwayOffscreen){ctx.drawImage(norwayOffscreen,BBOX.x1,BBOX.y1,BBOX.w,BBOX.h,OX,OY,BBOX.w*CANVAS_SCALE,BBOX.h*CANVAS_SCALE);}
  Object.entries(AP).forEach(([icao,ap])=>{
    if(!CALIBRATED.has(icao))return;
    const[x,y]=proj(ap.lat,ap.lon);
    if(x<-5||x>MAP_W+5||y<-5||y>MAP_H+5)return;
    ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);
    ctx.fillStyle='#2a4a6a';ctx.fill();
    ctx.strokeStyle='#4ea8de55';ctx.lineWidth=0.5;ctx.stroke();
  });
  if(legs&&legs.length>0){
    const routeIcaos=[waypoints[0].icao,...legs.map(l=>l.to)];
    ctx.beginPath();ctx.setLineDash([4,3]);ctx.lineWidth=1.5;ctx.strokeStyle='rgba(232,160,32,0.85)';
    let started=false;
    routeIcaos.forEach(icao=>{const ap=AP[icao];if(!ap)return;const[x,y]=proj(ap.lat,ap.lon);started?ctx.lineTo(x,y):ctx.moveTo(x,y);started=true;});
    ctx.stroke();ctx.setLineDash([]);
  }
  const wpList=wps||waypoints.map(w=>({icao:w.icao}));
  wpList.forEach((wp,i)=>{
    const ap=AP[wp.icao];if(!ap)return;
    const[x,y]=proj(ap.lat,ap.lon);
    if(x<-5||x>MAP_W+5||y<-5||y>MAP_H+5)return;
    const legNext=(legs||[])[i];
    const warn=legNext&&!legNext.feasible;
    const isLast=wps?i===wps.length-1:i===waypoints.length-1;
    const color=warn?'#e05252':isLast?'#52c07a':'#e8a020';
    const grad=ctx.createRadialGradient(x,y,2,x,y,10);
    grad.addColorStop(0,warn?'rgba(224,82,82,0.5)':isLast?'rgba(82,192,122,0.5)':'rgba(232,160,32,0.5)');
    grad.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.font='bold 9px "IBM Plex Mono",monospace';ctx.fillStyle='#f0f4fa';
    ctx.fillText(wp.icao,x+7,y-4);
  });
}

// OPTIMIZE ROUTE
// Frosta gets a priority bonus over nearby airports
// ═══════════════════════════════════════════════════════════
// Airports that get score bonus (lower score = preferred)
const PRIORITY_AIRPORTS = { FROSTA: 30, ENFJ: 30 }; // bonus in NM subtracted from remaining dist score

function optimizeRoute() {
  const msgEl = document.getElementById('opt-msg');
  msgEl.style.display='none';
  const fromIcao = waypoints[0].icao;
  const toIcao   = waypoints[waypoints.length-1].icao;
  if (!AP[fromIcao]||!AP[toIcao]) {
    msgEl.textContent='Sett gyldig avgangs- og destinasjonsplass (første og siste waypoint) før optimalisering.';
    msgEl.style.display='block'; return;
  }
  if (fromIcao===toIcao) { msgEl.textContent='Avgang og destinasjon er samme flyplass.'; msgEl.style.display='block'; return; }
  const tas = parseFloat(document.getElementById('tas').value)||125;
  const rDir = parseFloat(document.getElementById('route-wind-dir').value);
  const rSpd = parseFloat(document.getElementById('route-wind-spd').value);
  const hasWind = !isNaN(rDir) && !isNaN(rSpd);

  // Max range: use TAS as conservative base (wind varies per leg)
  const maxTripFuel = (MAX_FUEL-FINAL_RESERVE)/(1+CONT_PCT);
  const maxRangeNM  = (maxTripFuel/FUEL_FLOW)*tas;

  // Wind-adjusted range between two airports
  function windRange(fromIcao, toIcao) {
    if (!hasWind) return maxRangeNM;
    const a=AP[fromIcao], b=AP[toIcao];
    const track = bearing(a.lat,a.lon,b.lat,b.lon);
    const hw = headwindComponent(rDir,rSpd,track);
    const gs = Math.max(30, tas-hw);
    return (maxTripFuel/FUEL_FLOW)*gs;
  }

  const excludedAirports = window._excludedAirports||new Set();
  const candidates = Object.keys(AP).filter(k=>k!==fromIcao&&!excludedAirports.has(k));

  function findNext(curIcao, destIcao, visited) {
    const cur=AP[curIcao], dest=AP[destIcao];
    const bearToDest=bearing(cur.lat,cur.lon,dest.lat,dest.lon);
    let best=null, bestScore=Infinity;
    for (const cand of candidates) {
      if (cand===curIcao||visited.has(cand)) continue;
      const ap=AP[cand];
      const distToCandidate=haversine(cur.lat,cur.lon,ap.lat,ap.lon);
      const legRange = windRange(curIcao, cand);
      if (distToCandidate>legRange) continue;
      const bearToCandidate=bearing(cur.lat,cur.lon,ap.lat,ap.lon);
      const angDiff=Math.abs(((bearToCandidate-bearToDest+180+360)%360)-180);
      if (angDiff>120) continue;
      const distFromCandToDest=haversine(ap.lat,ap.lon,dest.lat,dest.lon);
      const bonus = PRIORITY_AIRPORTS[cand]||0;
      const score = distFromCandToDest - bonus;
      if (score<bestScore) { bestScore=score; best=cand; }
    }
    return best;
  }

  const route=[fromIcao];
  const visited=new Set([fromIcao]);
  let current=fromIcao;
  const directRange=windRange(fromIcao,toIcao);
  const directDist=haversine(AP[fromIcao].lat,AP[fromIcao].lon,AP[toIcao].lat,AP[toIcao].lon);
  if (directDist<=directRange) {
    route.push(toIcao);
  } else {
    let hops=0;
    while (current!==toIcao&&hops<15) {
      const legRng=windRange(current,toIcao);
      const distToDest=haversine(AP[current].lat,AP[current].lon,AP[toIcao].lat,AP[toIcao].lon);
      if (distToDest<=legRng) { route.push(toIcao); break; }
      const next=findNext(current,toIcao,visited);
      if (!next) {
        msgEl.textContent=`Finner ingen gyldig rute fra ${current} til ${toIcao} innenfor rekkevidde.`;
        msgEl.style.display='block'; return;
      }
      route.push(next); visited.add(next); current=next; hops++;
    }
    if (route[route.length-1]!==toIcao) route.push(toIcao);
  }

  waypoints=route.map(icao=>({icao,mode:'gs',gs:tas,windDir:270,windSpd:0,gstop:30}));

  // Re-apply route wind if it's still set in the fields
  if (hasWind) {
    waypoints.forEach((wp,i) => {
      if (i < waypoints.length-1) { wp.windDir=rDir; wp.windSpd=rSpd; wp.mode='wind'; }
    });
  }
  renderRoute(); drawMap();
  const stops=route.length-2;
  const totalDist=route.reduce((sum,icao,i)=>{if(i===0)return 0;return sum+Math.round(haversine(AP[route[i-1]].lat,AP[route[i-1]].lon,AP[icao].lat,AP[icao].lon));},0);
  const stopsText=stops===0?'direkteflygning — ingen stopp nødvendig':`${stops} mellomlanding${stops>1?'er':''}: ${route.slice(1,-1).join(' → ')}`;
  msgEl.textContent=`Optimalisert: ${fromIcao} → ${toIcao} — ${stopsText}. Total distanse: ${totalDist} NM. Max rekkevidde per leg: ${Math.round(maxRangeNM)} NM.`;
  msgEl.style.display='block';
}

// ═══════════════════════════════════════════════════════════
// EXCLUDED AIRPORTS
// ═══════════════════════════════════════════════════════════
window._excludedAirports=new Set();

function excludeAirport(icao) {
  if(!icao||icao.length<2)return;
  window._excludedAirports.add(icao.toUpperCase());
  renderExcluded();
}
function unexcludeAirport(icao) {
  window._excludedAirports.delete(icao);
  renderExcluded();
}
function renderExcluded() {
  const wrap=document.getElementById('excluded-tags-wrap');
  const container=document.getElementById('excluded-tags');
  if(window._excludedAirports.size===0){wrap.style.display='none';container.innerHTML='';return;}
  wrap.style.display='block';
  container.innerHTML=[...window._excludedAirports].map(icao=>{
    const ap=AP[icao];
    return `<div style="display:inline-flex;align-items:center;gap:5px;background:rgba(224,82,82,0.1);border:1px solid rgba(224,82,82,0.4);border-radius:3px;padding:3px 8px;">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--danger);font-weight:600;">${icao}</span>
      ${ap?`<span style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);">${ap.name}</span>`:''}
      <button onclick="unexcludeAirport('${icao}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0;line-height:1;">×</button>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
renderRoute();
drawMap();

</script>
